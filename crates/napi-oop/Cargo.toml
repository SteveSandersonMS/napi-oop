[package]
name = "napi-oop"
description = "Out-of-process runtime for napi-style Node <-> Rust bindings."
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
rust-version.workspace = true

[dependencies]
interprocess = "2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
rmp-serde = "1"
rmpv = { version = "1", features = ["with-serde"] }
inventory = "0.3"
pollster = "0.4"

[dev-dependencies]
napi-oop-macro = { path = "../napi-oop-macro", features = ["out-of-proc"] }
